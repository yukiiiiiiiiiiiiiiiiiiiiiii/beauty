<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        img { width: 100%; height: 100%; object-fit: cover; } /* 确保图片铺满全屏且不变形 */
    </style>
</head>
<body>
    <img id="bg" src="" alt="loading...">
    <script>
        const pcPics = ['p1.jpg', 'p2.jpg']; // 存放横屏图片路径
        const mobilePics = [
        'https://k-vault-18l.pages.dev/file/AgACAgUAAyEGAATmY_EuAANaaewwZ93txJFY6s1QTfsb9fL7Ta8AAo8Paxs182BXa42q2GZi0moBAAMCAAN3AAM7BA.jpg',
        'https://k-vault-18l.pages.dev/file/AgACAgUAAyEGAATmY_EuAANYaewwYgIHQOmmNGr31T11QTn0qREAAo4Paxs182BXNBNuI8p1hqQBAAMCAAN3AAM7BA.jpg',
        'https://k-vault-18l.pages.dev/file/AgACAgUAAyEGAATmY_EuAANWaewwXbDomdqROqauELBqkxTa4sAAAo0Paxs182BXD0vRau5MPS0BAAMCAAN3AAM7BA.jpg',
        'https://k-vault-18l.pages.dev/file/AgACAgUAAyEGAATmY_EuAANUaewwWX3F3v36-OMLmb8lVJtALmIAAowPaxs182BXAAEvO11mGJ92AQADAgADdwADOwQ.jpg',
        'https://k-vault-18l.pages.dev/file/AgACAgUAAyEGAATmY_EuAANSaewwVlAJLkAX1FhbZcE-UDmUdzwAAosPaxs182BXX7hwX1NOf_cBAAMCAAN3AAM7BA.jpg',
        'https://k-vault-18l.pages.dev/file/AgACAgUAAyEGAATmY_EuAANQaewwU4i_nqg-vxx4YRcKjaFDgSQAAooPaxs182BXUlekH2pG4MsBAAMCAAN3AAM7BA.jpg',
        'https://k-vault-18l.pages.dev/file/AgACAgUAAyEGAATmY_EuAANOaewwTX1EB0aahVjDAwMBjI2NuKwAAokPaxs182BX9QQQExs9XwUBAAMCAAN3AAM7BA.jpg',
        'https://k-vault-18l.pages.dev/file/AgACAgUAAyEGAATmY_EuAANMaewwSvGbMoBSIezNVC1pAZPvUFQAAogPaxs182BXr84vj5krV0QBAAMCAAN3AAM7BA.jpg',
        'https://k-vault-18l.pages.dev/file/AgACAgUAAyEGAATmY_EuAANKaewwRYCTl9TTy5TiX0zMWvDU2R0AAocPaxs182BX9KyCaiQIPHEBAAMCAAN3AAM7BA.jpg',
        'https://k-vault-18l.pages.dev/file/AgACAgUAAyEGAATmY_EuAANIaewwPTiq4BUasMS7rMryCXN6OVcAAoYPaxs182BXWXdo55L-Kt0BAAMCAAN3AAM7BA.jpg']; // 存放竖屏图片路径

        function loadRandomPic() {
            const isPortrait = window.innerHeight > window.innerWidth; // 判断是否为竖屏 
            const list = isPortrait ? mobilePics : pcPics;
            const randomImg = list[Math.floor(Math.random() * list.length)];
            document.getElementById('bg').src = randomImg;
        }

        window.onload = loadRandomPic;
        window.onresize = loadRandomPic; // 屏幕尺寸变化时自动切换 
    </script>
</body>
</html>
